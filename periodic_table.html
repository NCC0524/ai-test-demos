<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>元素週期表</title>
  <script src="https://cdn.jsdelivr.net/npm/brython@3.12.3/brython.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #0f0f1a;
      color: #cdd6f4;
      min-height: 100vh;
      padding: 1.5rem;
    }
    h1 {
      text-align: center;
      font-size: 1.6rem;
      color: #89dceb;
      margin-bottom: 0.3rem;
      letter-spacing: 0.05em;
    }
    .subtitle {
      text-align: center;
      color: #6c7086;
      font-size: 0.8rem;
      margin-bottom: 1.5rem;
    }

    /* 圖例 */
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      justify-content: center;
      margin-bottom: 1.2rem;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.72rem;
      color: #a6adc8;
    }
    .legend-dot {
      width: 12px; height: 12px;
      border-radius: 3px;
    }

    /* 週期表格 */
    #periodic-table {
      display: grid;
      grid-template-columns: repeat(18, minmax(58px, 1fr));
      gap: 3px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .element {
      border-radius: 6px;
      padding: 4px 3px;
      text-align: center;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.08);
      transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
      position: relative;
      min-height: 62px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .element:hover {
      transform: scale(1.12);
      z-index: 10;
      border-color: rgba(255,255,255,0.5);
      box-shadow: 0 4px 20px rgba(0,0,0,0.6);
    }
    .element .num {
      font-size: 0.6rem;
      color: rgba(255,255,255,0.6);
      line-height: 1;
    }
    .element .sym {
      font-size: 1.15rem;
      font-weight: 700;
      line-height: 1.2;
      color: #fff;
    }
    .element .zh {
      font-size: 0.58rem;
      color: rgba(255,255,255,0.85);
      line-height: 1.2;
    }
    .element .wt {
      font-size: 0.55rem;
      color: rgba(255,255,255,0.5);
      line-height: 1;
    }
    .empty { background: transparent; border: none; }
    .period-label {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      color: #6c7086;
      font-weight: bold;
    }

    /* 詳細資訊面板 */
    #info-panel {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      background: #1e1e2e;
      border: 1px solid #45475a;
      border-radius: 12px;
      padding: 1rem 1.2rem;
      min-width: 220px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      display: none;
      z-index: 100;
    }
    #info-panel .ip-sym {
      font-size: 2.5rem;
      font-weight: 900;
      line-height: 1;
    }
    #info-panel .ip-name {
      font-size: 1rem;
      color: #a6adc8;
      margin: 0.2rem 0 0.8rem;
    }
    #info-panel table { width: 100%; font-size: 0.8rem; }
    #info-panel td { padding: 2px 4px; color: #cdd6f4; }
    #info-panel td:first-child { color: #6c7086; width: 60%; }

    .status-bar {
      text-align: center;
      margin-top: 1.2rem;
      font-size: 0.75rem;
      color: #6c7086;
    }
    .status-bar.done { color: #a6e3a1; }
  </style>
</head>

    row = period
    col = group
    grid[(row, col)] = e

    item = html.DIV(Class="legend-item")
    dot = html.DIV(Class="legend-dot")
    dot.style.background = color
    item <= dot
    item <= html.SPAN(CATEGORY_ZH[cat])
    legend_div <= item

# 用 CSS grid，row 1-7 正常，row 8 空，row 9-10 鑭錒系
# 每列 18 格

# 格子填充函式
def make_element_cell(e):
    num, sym, zh, en, wt, cat, period, group = e
    color = CATEGORY_COLORS[cat]
    div = html.DIV(Class="element")
    div.style.background = color + "cc"
    div.style.borderColor = color

    n = html.DIV(str(num), Class="num")
    s = html.DIV(sym, Class="sym")
    z = html.DIV(zh, Class="zh")
    w = html.DIV(f"{wt:.3f}", Class="wt")
    div <= n
    div <= s
    div <= z
    div <= w

    # 點擊顯示詳細資訊
    def show_info(ev, elem=e):
        n2, s2, z2, e2, w2, c2, p2, g2 = elem
        panel = document["info-panel"]
        panel.clear()
        sym_div = html.DIV(s2, Class="ip-sym")
        sym_div.style.color = CATEGORY_COLORS[c2]
        panel <= sym_div
        panel <= html.DIV(f"{z2} · {e2}", Class="ip-name")
        t = html.TABLE()
        rows_data = [
            ("原子序", str(n2)),
            ("原子量", f"{w2:.4f}"),
            ("類別", CATEGORY_ZH[c2]),
            ("週期", str(p2)),
            ("族", str(g2)),
        ]
        for label, val in rows_data:
            tr = html.TR()
            tr <= html.TD(label)
            tr <= html.TD(val)
            t <= tr
        panel <= t
        panel.style.display = "block"
        panel.style.borderColor = CATEGORY_COLORS[c2]

    div.bind("click", show_info)
    return div

    d = html.DIV(Class="element empty")
    return d

        if (row, col) in grid:
            table_div <= make_element_cell(grid[(row, col)])
        else:
            table_div <= make_empty()

    elif (9, col) in grid:

    else:

    elif (10, col) in grid:

    else:

    panel = document["info-panel"]
    if ev.target.closest("#info-panel") is None and not ev.target.classList.contains("element"):
        panel.style.display = "none"

document.bind("click", close_panel)

status.className = "status-bar done"
