<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>元素週期表</title>
  <script src="https://cdn.jsdelivr.net/npm/brython@3.12.3/brython.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #0f0f1a;
      color: #cdd6f4;
      min-height: 100vh;
      padding: 1.5rem;
    }
    h1 {
      text-align: center;
      font-size: 1.6rem;
      color: #89dceb;
      margin-bottom: 0.3rem;
      letter-spacing: 0.05em;
    }
    .subtitle {
      text-align: center;
      color: #6c7086;
      font-size: 0.8rem;
      margin-bottom: 1rem;
    }

    /* 搜尋框 */
    .search-bar {
      display: flex;
      justify-content: center;
      margin-bottom: 1rem;
    }
    .search-bar input {
      width: 320px;
      padding: 0.5rem 1rem;
      border-radius: 999px;
      border: 1px solid #45475a;
      background: #1e1e2e;
      color: #cdd6f4;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .search-bar input::placeholder { color: #6c7086; }
    .search-bar input:focus {
      border-color: #89dceb;
      box-shadow: 0 0 0 3px rgba(137,220,235,0.15);
    }
    .search-bar .clear-btn {
      margin-left: -2rem;
      background: none;
      border: none;
      color: #6c7086;
      cursor: pointer;
      font-size: 1rem;
      line-height: 1;
      padding: 0 0.4rem;
      display: none;
    }
    .search-bar .clear-btn:hover { color: #cdd6f4; }

    /* 圖例 / 篩選器 */
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      justify-content: center;
      margin-bottom: 1.2rem;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.72rem;
      color: #a6adc8;
      padding: 3px 8px;
      border-radius: 999px;
      border: 1px solid transparent;
      cursor: pointer;
      user-select: none;
      transition: opacity 0.2s, border-color 0.2s, background 0.2s;
    }
    .legend-item:hover { border-color: rgba(255,255,255,0.3); }
    .legend-item.active { border-color: rgba(255,255,255,0.4); background: rgba(255,255,255,0.07); }
    .legend-item.inactive { opacity: 0.35; }
    .legend-dot {
      width: 10px; height: 10px;
      border-radius: 3px;
      flex-shrink: 0;
    }

    /* 週期表 */
    #periodic-table {
      display: grid;
      grid-template-columns: repeat(18, minmax(58px, 1fr));
      gap: 3px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .element {
      border-radius: 6px;
      padding: 4px 3px;
      text-align: center;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.08);
      transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s, opacity 0.2s;
      position: relative;
      min-height: 64px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .element:hover {
      transform: scale(1.12);
      z-index: 10;
      border-color: rgba(255,255,255,0.5);
      box-shadow: 0 4px 20px rgba(0,0,0,0.6);
    }
    .element.dimmed { opacity: 0.12; pointer-events: none; }
    .element.highlighted { outline: 2px solid #f9e2af; z-index: 5; }

    .element .top-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 0 2px;
    }
    .element .num {
      font-size: 0.58rem;
      color: rgba(255,255,255,0.6);
      line-height: 1;
    }
    .element .state-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 1px;
    }
    .element .sym {
      font-size: 1.15rem;
      font-weight: 700;
      line-height: 1.2;
      color: #fff;
    }
    .element .zh {
      font-size: 0.58rem;
      color: rgba(255,255,255,0.85);
      line-height: 1.2;
    }
    .element .wt {
      font-size: 0.52rem;
      color: rgba(255,255,255,0.45);
      line-height: 1;
    }
    .empty { background: transparent !important; border: none !important; }
    .empty:hover { transform: none !important; box-shadow: none !important; }
    .period-label {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.72rem;
      color: #6c7086;
      font-weight: bold;
      min-height: 64px;
    }

    /* 詳細資訊面板 */
    #info-panel {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      background: #1e1e2e;
      border: 1px solid #45475a;
      border-radius: 14px;
      padding: 1.1rem 1.3rem;
      min-width: 250px;
      max-width: 300px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
      display: none;
      z-index: 200;
    }
    .ip-header { display: flex; align-items: flex-end; gap: 0.7rem; margin-bottom: 0.8rem; }
    .ip-sym { font-size: 2.8rem; font-weight: 900; line-height: 1; }
    .ip-header-right {}
    .ip-zh  { font-size: 1.1rem; font-weight: 600; color: #cdd6f4; }
    .ip-en  { font-size: 0.78rem; color: #6c7086; margin-top: 1px; }
    .ip-num { font-size: 0.72rem; color: #6c7086; }

    .ip-divider { border: none; border-top: 1px solid #313244; margin: 0.6rem 0; }

    .ip-table { width: 100%; font-size: 0.78rem; border-collapse: collapse; }
    .ip-table td { padding: 3px 2px; vertical-align: top; }
    .ip-table td:first-child { color: #6c7086; width: 38%; white-space: nowrap; }
    .ip-table td:last-child  { color: #cdd6f4; }

    .ip-state {
      display: inline-block;
      padding: 1px 8px;
      border-radius: 999px;
      font-size: 0.72rem;
      font-weight: 600;
    }
    .ip-uses { color: #a6adc8 !important; font-size: 0.75rem; line-height: 1.5; }
    .ip-econfig { font-family: 'Consolas', monospace; font-size: 0.75rem; color: #89b4fa !important; }

    .ip-close {
      position: absolute;
      top: 0.6rem; right: 0.8rem;
      background: none; border: none;
      color: #6c7086; cursor: pointer;
      font-size: 1.1rem; line-height: 1;
    }
    .ip-close:hover { color: #cdd6f4; }

    /* 搜尋結果提示 */
    #search-hint {
      text-align: center;
      font-size: 0.75rem;
      color: #6c7086;
      margin-top: 0.6rem;
      min-height: 1rem;
    }

    .status-bar {
      text-align: center;
      margin-top: 1rem;
      font-size: 0.75rem;
      color: #6c7086;
    }
    .status-bar.done { color: #a6e3a1; }
  </style>
</head>

active_cats = set(CATEGORY_COLORS.keys())   # 所有類別都啟用

legend_items = {}  # cat -> legend div

# ── 圖例 / 篩選器 ─────────────────────────────────────────
legend_div = document["legend"]
for cat, color in CATEGORY_COLORS.items():
    item = html.DIV(Class="legend-item active")
    dot = html.DIV(Class="legend-dot")
    dot.style.background = color
    item <= dot
    item <= html.SPAN(CATEGORY_ZH[cat])
    legend_items[cat] = item

    def toggle_cat(ev, c=cat):
        if c in active_cats:
            active_cats.discard(c)
            legend_items[c].classList.remove("active")
            legend_items[c].classList.add("inactive")
        else:
            active_cats.add(c)
            legend_items[c].classList.add("active")
            legend_items[c].classList.remove("inactive")
        update_display()

    item.bind("click", toggle_cat)
    legend_div <= item

# ── 更新顯示（搜尋 + 篩選器合併） ────────────────────────
def update_display():
    query = document["search-input"].value.strip().lower()
    matched = 0
    for num, div in element_divs.items():
        e = elem_by_num[num]
        _, sym, zh, en, _, cat, _, _ = e
        # 篩選器
        cat_ok = cat in active_cats
        # 搜尋
        if query:
            search_ok = (query in sym.lower() or
                         query in zh.lower() or
                         query in en.lower() or
                         query == str(num))
        else:
            search_ok = True

        if cat_ok and search_ok:
            div.classList.remove("dimmed")
            if query:
                div.classList.add("highlighted")
                matched += 1
            else:
                div.classList.remove("highlighted")
        else:
            div.classList.add("dimmed")
            div.classList.remove("highlighted")

    hint = document["search-hint"]
    if query:
        hint.text = f"找到 {matched} 個符合「{query}」的元素"
        document["clear-btn"].style.display = "inline"
    else:
        hint.text = ""
        document["clear-btn"].style.display = "none"

# ── 搜尋事件 ─────────────────────────────────────────────

search_input.bind("input", lambda ev: update_display())

def clear_search(ev):
    document["search-input"].value = ""

# ── 建立元素格子 ──────────────────────────────────────────
def make_element_cell(e):
    num, sym, zh, en, wt, cat, period, group = e
    color = CATEGORY_COLORS[cat]
    state, econfig, uses = EXTRA.get(num, ("solid", "—", "—"))

    div = html.DIV(Class="element")
    div.style.background = color + "cc"
    div.style.borderColor = color

    # 頂列：原子序 + 狀態點
    top = html.DIV(Class="top-row")
    top <= html.SPAN(str(num), Class="num")
    dot = html.SPAN(Class="state-dot")
    dot.style.background = STATE_COLORS[state]
    top <= dot
    div <= top

    div <= html.DIV(sym, Class="sym")
    div <= html.DIV(zh,  Class="zh")
    div <= html.DIV(f"{wt:.3f}", Class="wt")

    element_divs[num] = div

    def show_info(ev, elem=e):
        n2, s2, z2, e2, w2, c2, p2, g2 = elem
        st, ec, us = EXTRA.get(n2, ("solid", "—", "—"))
        panel = document["info-panel"]
        panel.clear()

        # 關閉按鈕
        close = html.BUTTON("✕", Class="ip-close")
        def close_panel(ev): panel.style.display = "none"
        close.bind("click", close_panel)
        panel <= close

        # 標題列
        header = html.DIV(Class="ip-header")
        sym_div = html.DIV(s2, Class="ip-sym")
        sym_div.style.color = CATEGORY_COLORS[c2]
        header <= sym_div
        right = html.DIV(Class="ip-header-right")
        right <= html.DIV(f"{z2} {e2}", Class="ip-zh")
        right <= html.DIV(CATEGORY_ZH[c2], Class="ip-en")
        right <= html.DIV(f"原子序 {n2}", Class="ip-num")
        header <= right
        panel <= header
        panel <= html.HR(Class="ip-divider")

        # 資料表
        t = html.TABLE(Class="ip-table")

        # 狀態
        tr = html.TR()
        tr <= html.TD("常溫狀態")
        state_span = html.SPAN(STATE_ZH[st], Class="ip-state")
        state_span.style.background = STATE_COLORS[st] + "33"
        state_span.style.color = STATE_COLORS[st]
        td_val = html.TD()
        td_val <= state_span
        tr <= td_val
        t <= tr

        # 原子量
        tr2 = html.TR()
        tr2 <= html.TD("原子量")
        tr2 <= html.TD(f"{w2:.4f} u")
        t <= tr2

        # 週期 / 族
        tr3 = html.TR()
        tr3 <= html.TD("週期 / 族")
        tr3 <= html.TD(f"第 {p2} 週期 · 第 {g2} 族")
        t <= tr3

        # 電子組態
        tr4 = html.TR()
        tr4 <= html.TD("電子組態")
        td_ec = html.TD(ec, Class="ip-econfig")
        tr4 <= td_ec
        t <= tr4

        # 主要用途
        tr5 = html.TR()
        tr5 <= html.TD("主要用途")
        td_us = html.TD(us, Class="ip-uses")
        tr5 <= td_us
        t <= tr5

        panel <= t
        panel.style.display = "block"
        panel.style.borderColor = CATEGORY_COLORS[c2]
        ev.stopPropagation()

    div.bind("click", show_info)
    return div

def make_empty():
    return html.DIV(Class="element empty")
